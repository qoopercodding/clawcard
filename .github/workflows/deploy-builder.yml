name: Deploy ClawCard Builder to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wildfrost-poc/clawcard-builder/**'
      - '.github/workflows/deploy-builder.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wildfrost-poc/clawcard-builder/package-lock.json

      - name: Install dependencies
        working-directory: wildfrost-poc/clawcard-builder
        run: npm ci

      - name: Build
        working-directory: wildfrost-poc/clawcard-builder
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wildfrost-poc/clawcard-builder/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
