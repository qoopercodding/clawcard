<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3a1a08"/>
      <stop offset="100%" style="stop-color:#150800"/>
    </radialGradient>
    <radialGradient id="heat" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#ff8800"/>
      <stop offset="50%" style="stop-color:#cc4400"/>
      <stop offset="100%" style="stop-color:#661100"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="steam">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg2)" rx="12"/>

  <!-- Main cannon barrel — oversized -->
  <rect x="30" y="95" width="160" height="66" rx="12" fill="#3a2010" stroke="#ff6600" stroke-width="2.5"/>
  <!-- Barrel inner -->
  <ellipse cx="30" cy="128" rx="22" ry="30" fill="#1a0a00" stroke="#ff4400" stroke-width="2"/>
  <!-- Muzzle glow -->
  <ellipse cx="30" cy="128" rx="16" ry="22" fill="url(#heat)" filter="url(#glow2)" opacity="0.9"/>
  <ellipse cx="30" cy="128" rx="8" ry="12" fill="#ffcc00" opacity="0.8"/>

  <!-- Cannon body detail rings -->
  <rect x="80" y="95" width="8" height="66" rx="2" fill="#ff6600" opacity="0.6"/>
  <rect x="110" y="95" width="8" height="66" rx="2" fill="#ff6600" opacity="0.4"/>
  <rect x="140" y="95" width="8" height="66" rx="2" fill="#ff6600" opacity="0.3"/>

  <!-- Top venting grills -->
  <rect x="50" y="85" width="100" height="14" rx="4" fill="#2a1505" stroke="#ff6600" stroke-width="1.5"/>
  <rect x="58" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>
  <rect x="72" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>
  <rect x="86" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>
  <rect x="100" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>
  <rect x="114" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>
  <rect x="128" y="88" width="8" height="8" rx="1" fill="#1a0a00"/>

  <!-- Steam venting (wavy lines) -->
  <path d="M60 78 Q65 68 70 78 Q75 88 80 78" stroke="#aaaaaa" stroke-width="2" fill="none" opacity="0.6" filter="url(#steam)"/>
  <path d="M90 72 Q95 60 100 72 Q105 84 110 72" stroke="#cccccc" stroke-width="2" fill="none" opacity="0.5" filter="url(#steam)"/>
  <path d="M120 76 Q125 64 130 76 Q135 88 140 76" stroke="#888888" stroke-width="2" fill="none" opacity="0.4" filter="url(#steam)"/>

  <!-- Handle / grip at bottom -->
  <rect x="100" y="158" width="56" height="30" rx="8" fill="#2a1505" stroke="#ff4400" stroke-width="2"/>
  <rect x="110" y="163" width="36" height="20" rx="4" fill="#1a0a00"/>

  <!-- Overheat meter on side -->
  <rect x="195" y="90" width="20" height="76" rx="4" fill="#1a0a00" stroke="#ff6600" stroke-width="1.5"/>
  <rect x="197" y="130" width="16" height="34" rx="3" fill="#ff2200"/>
  <rect x="197" y="110" width="16" height="20" rx="3" fill="#ff8800"/>
  <text x="205" y="88" font-family="monospace" font-size="7" fill="#ff6600" text-anchor="middle">🔥</text>

  <!-- Energy crackles -->
  <path d="M25 110 L15 118 L22 118 L12 128" stroke="#ffcc00" stroke-width="1.5" fill="none" filter="url(#glow2)" opacity="0.8"/>
  <path d="M25 140 L14 148 L20 147 L10 155" stroke="#ff8800" stroke-width="1.5" fill="none" filter="url(#glow2)" opacity="0.7"/>

  <!-- Name badge -->
  <rect x="50" y="8" width="156" height="22" rx="6" fill="#1a0800" stroke="#ff6600" stroke-width="1.5"/>
  <text x="128" y="23" font-family="monospace" font-size="10" font-weight="bold" fill="#ff8800" text-anchor="middle">BONGO CANNON</text>
</svg>
