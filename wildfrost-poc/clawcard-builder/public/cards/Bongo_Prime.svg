<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#00cfff"/>
      <stop offset="60%" style="stop-color:#0066aa"/>
      <stop offset="100%" style="stop-color:#003366"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="url(#bg)" rx="12"/>

  <!-- Body — torso -->
  <rect x="88" y="110" width="80" height="90" rx="8" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>

  <!-- Chest core — glowing blue -->
  <ellipse cx="128" cy="145" rx="22" ry="22" fill="url(#core)" filter="url(#glow)" stroke="#00cfff" stroke-width="2"/>
  <ellipse cx="128" cy="145" rx="12" ry="12" fill="#00eeff" opacity="0.8"/>
  <ellipse cx="123" cy="140" rx="4" ry="4" fill="white" opacity="0.6"/>

  <!-- Head -->
  <rect x="96" y="60" width="64" height="52" rx="10" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>
  <!-- Eyes -->
  <rect x="106" y="74" width="16" height="10" rx="3" fill="#00cfff" filter="url(#glow)"/>
  <rect x="134" y="74" width="16" height="10" rx="3" fill="#00cfff" filter="url(#glow)"/>
  <!-- Jaw -->
  <rect x="104" y="92" width="48" height="10" rx="4" fill="#1a3050" stroke="#4a8aaa" stroke-width="1"/>

  <!-- Left arm — raised heroic pose -->
  <rect x="52" y="90" width="38" height="22" rx="8" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2" transform="rotate(-35 71 101)"/>
  <!-- Left fist -->
  <rect x="35" y="55" width="28" height="28" rx="6" fill="#3a5a7a" stroke="#4a8aaa" stroke-width="2"/>

  <!-- Right arm -->
  <rect x="166" y="110" width="38" height="22" rx="8" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>
  <!-- Right fist -->
  <rect x="198" y="110" width="26" height="26" rx="6" fill="#3a5a7a" stroke="#4a8aaa" stroke-width="2"/>

  <!-- Legs -->
  <rect x="92" y="195" width="28" height="45" rx="6" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>
  <rect x="136" y="195" width="28" height="45" rx="6" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>

  <!-- Feet -->
  <rect x="86" y="232" width="38" height="14" rx="4" fill="#1a3050" stroke="#4a8aaa" stroke-width="2"/>
  <rect x="130" y="232" width="38" height="14" rx="4" fill="#1a3050" stroke="#4a8aaa" stroke-width="2"/>

  <!-- Shoulder pads -->
  <ellipse cx="86" cy="118" rx="14" ry="10" fill="#3a6a9a" stroke="#5aaacc" stroke-width="1.5"/>
  <ellipse cx="170" cy="118" rx="14" ry="10" fill="#3a6a9a" stroke="#5aaacc" stroke-width="1.5"/>

  <!-- Transform glow effect when low HP hint -->
  <ellipse cx="128" cy="145" rx="35" ry="35" fill="none" stroke="#00cfff" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- Name badge -->
  <rect x="60" y="8" width="136" height="22" rx="6" fill="#0a1a2a" stroke="#00cfff" stroke-width="1.5"/>
  <text x="128" y="23" font-family="monospace" font-size="11" font-weight="bold" fill="#00cfff" text-anchor="middle">BONGO PRIME</text>
</svg>
